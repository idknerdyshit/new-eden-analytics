services:
  traefik:
    image: traefik:v3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nea_dev}
      POSTGRES_DB: ${POSTGRES_DB:-new_eden_analytics}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nea} -d ${POSTGRES_DB:-new_eden_analytics}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend-server:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
      target: nea-server
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-nea}:${POSTGRES_PASSWORD:-nea_dev}@timescaledb:5432/${POSTGRES_DB:-new_eden_analytics}
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api.priority=2"
      - "traefik.http.services.api.loadbalancer.server.port=3001"
    restart: unless-stopped

  backend-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
      target: nea-worker
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-nea}:${POSTGRES_PASSWORD:-nea_dev}@timescaledb:5432/${POSTGRES_DB:-new_eden_analytics}
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kill", "-0", "1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    env_file: .env
    environment:
      API_BACKEND_URL: http://backend-server:3001
    depends_on:
      backend-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    restart: unless-stopped

volumes:
  pgdata:
  letsencrypt:
